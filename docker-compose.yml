version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    depends_on:
      - backend

  artist:
    build:
      context: ./microservices/artist
    env_file:
      - ./microservices/artist/.env
    restart: unless-stopped
    depends_on:
      - backend

  narrator:
    build:
      context: ./microservices/narrator
    env_file:
      - ./microservices/narrator/.env
    restart: unless-stopped
    depends_on:
      - backend
